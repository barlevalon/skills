name: Publish npm packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run publish dry-run without publishing
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
      - name: Use npm with Trusted Publisher support
        run: npm install -g npm@latest sigstore
      - run: npm ci
      - run: npm run ci
      - name: Dry-run packages
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        run: node scripts/publish-packages.mjs --dry-run
      - name: Publish packages
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
        run: node scripts/publish-packages.mjs
